[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — serve index.html para qualquer rota
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache agressivo para assets com hash (imutáveis)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
